<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyConcierge Pro Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --muted: #64748b;
            --sidebar: #1e293b; --sidebar-text: #f1f5f9;
        }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --sidebar: #0f172a; }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--sidebar); color: var(--sidebar-text); padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; color: var(--success); }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; color: var(--muted); font-size: 0.9rem; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item i { margin-right: 10px; width: 20px; text-align: center; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .kpi-title { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
        .kpi-value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        /* Actions Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 4px solid var(--primary); }
        
        .client-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .client-avatar { width: 40px; height: 40px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }
        
        .msg-box { background: var(--bg); padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 0.85rem; font-style: italic; }
        .photos-preview { display: flex; gap: 10px; margin-top: 10px; }
        .photo-thumb { width: 60px; height: 60px; background: #ddd; border-radius: 8px; background-size: cover; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; text-align: center; font-size: 0.85rem; }
        .btn-val { background: var(--success); color: white; grid-column: span 2; }
        .btn-wa { background: #25D366; color: white; }
        .btn-voice { background: var(--muted); color: white; }

        /* Contenu caché par défaut */
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-concierge-bell"></i> Elite Concierge</h2>
    <div class="nav-item active" onclick="switchPage('dashboard', this)"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="switchPage('planning', this)"><i class="fas fa-calendar-alt"></i> Planning</div>
    <div class="nav-item" onclick="switchPage('demandes', this)"><i class="fas fa-list-ul"></i> Demandes</div>
    <div class="nav-item" onclick="switchPage('stocks', this)"><i class="fas fa-boxes"></i> Stocks</div>
</div>

<div class="main-content">
    <header>
        <h1 id="page-title">Dashboard</h1>
        <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-adjust"></i></button>
    </header>

    <div id="dashboard" class="page-content active">
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-title">CA Estimé (Mois)</div><div class="kpi-value">12 450 €</div></div>
            <div class="kpi-card"><div class="kpi-title">Taux d'Occupation</div><div class="kpi-value">85%</div></div>
            <div class="kpi-card"><div class="kpi-title">Alertes Stock</div><div class="kpi-value" style="color:var(--danger)">Café / Draps</div></div>
        </div>

        <div class="grid-container" id="app">
            </div>
    </div>

    <div id="planning" class="page-content">
        <div class="kpi-card"><h3>Calendrier Général</h3><p style="margin-top:20px; color:var(--muted)">Vue planning en cours de développement...</p></div>
    </div>

    <div id="stocks" class="page-content">
        <div class="kpi-card"><h3>Inventaire en temps réel</h3><p style="margin-top:20px; color:var(--muted)">Gestion des stocks en cours de développement...</p></div>
    </div>
</div>

<script>
    // 1. Logique des pages (Sidebar)
    function switchPage(pageId, element) {
        // Cacher toutes les pages
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        // Désactiver tous les items du menu
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        // Afficher la page cliquée
        document.getElementById(pageId).classList.add('active');
        // Activer le menu cliqué
        element.classList.add('active');
        // Mettre à jour le titre
        document.getElementById('page-title').innerText = element.innerText;
    }

    // 2. Logique du flux (Cartes)
    const actions = [
        { id: 1, client: "Hans Müller", log: "Villa Cannes", source: "Airbnb", type: "check-in", lang: "DE", msg: "Können wir um 13 Uhr einchecken?", trans: "Pouvons-nous arriver à 13h ?", suggest: "Accorder arrivée anticipée (Ménage OK).", phone: "33612345678", urgent: true, photos: ['https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?q=50&w=100'] },
        { id: 2, client: "Sophie L.", log: "Studio Nice", source: "Booking.com", type: "upsell", lang: "FR", msg: "Possibilité d'avoir du champagne ?", trans: null, suggest: "Pack Romance 45€.", phone: "33600000000", urgent: false, photos: [] }
    ];

    function render() {
        const container = document.getElementById('app');
        container.innerHTML = actions.map(a => `
            <div class="card" style="border-top-color: ${a.urgent ? 'var(--danger)' : 'var(--primary)'}">
                <div class="client-header">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div class="client-avatar">${a.client.split(' ').map(n=>n[0]).join('')}</div>
                        <div><strong>${a.client}</strong><br><small style="color:var(--muted)">${a.log}</small></div>
                    </div>
                    <span class="client-avatar" style="font-size:0.7rem; background:#e0e7ff; color:var(--primary);">${a.lang}</span>
                </div>
                
                <div class="msg-box">
                    "${a.msg}"
                    ${a.trans ? `<div style="font-size:0.75rem; color:var(--muted); margin-top:5px; border-top:1px solid #ddd; padding-top:5px;">${a.trans}</div>` : ''}
                </div>

                <div style="font-size:0.85rem; color:var(--primary); background: #e0e7ff; padding:8px; border-radius:6px; font-weight:bold;">
                    <i class="fas fa-robot"></i> ${a.suggest}
                </div>

                <div class="btn-grid">
                    <button class="btn btn-val" onclick="validate(${a.id})"><i class="fas fa-check"></i> Valider</button>
                    <button class="btn btn-wa" onclick="sendWA('${a.phone}', '${a.suggest}')"><i class="fab fa-whatsapp"></i> Répondre</button>
                    <button class="btn btn-voice"><i class="fas fa-microphone"></i> Dictée</button>
                </div>
            </div>
        `).join('');
    }

    // Fonction WhatsApp opérationnelle
    function sendWA(phone, message) {
        const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    function validate(id) {
        const idx = actions.findIndex(x => x.id === id);
        actions.splice(idx, 1);
        render();
    }

    render();
</script>
</body>
</html>
