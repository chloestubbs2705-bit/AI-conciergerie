<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyConcierge Elite Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; --danger: #c0392b;
            --bg: #ecf0f1; --card: #ffffff; --text: #34495e; --muted: #7f8c8d;
            --sidebar: #2c3e50; --sidebar-text: #ecf0f1;
        }
        .dark-mode {                
            --primary: #34495e; --bg: #1a1a1a; --card: #2c3e50; --text: #ecf0f1; --muted: #bdc3c7;
            --sidebar: #1a1a1a;
        }                
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        
        .sidebar { width: 250px; background: var(--sidebar); color: var(--sidebar-text); padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1.1rem; margin-bottom: 30px; color: #f1c40f; text-transform: uppercase; letter-spacing: 1px;}
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; color: #bdc3c7; font-size: 0.9rem; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item i { margin-right: 10px; }

        .main-content { flex: 1; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .kpi-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .kpi-value { font-size: 1.4rem; font-weight: bold; color: var(--text); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); position: relative;}
        
        .client-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .client-info { display: flex; align-items: center; gap: 10px; }
        .client-avatar { width: 45px; height: 45px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }
        
        .alert-badge { background: var(--danger); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; position: absolute; top: 10px; right: 10px;}
        .msg-box { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 0.85rem; font-style: italic; }
        .suggest-box { font-size: 0.85rem; color: var(--text); background: rgba(0,0,0,0.05); padding: 10px; border-radius: 6px; font-weight: bold; margin-bottom: 10px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; text-align: center; font-size: 0.75rem; }
        .btn-val { background: var(--success); color: white; grid-column: span 3; font-size: 0.9rem; }
        .btn-wa { background: #27ae60; color: white; }
        .btn-vtc { background: #34495e; color: white; }
        .btn-voice { background: #e74c3c; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        th { background: rgba(0,0,0,0.05); color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-crown"></i> Concierge Elite</h2>
    <div class="nav-item active" onclick="switchPage('dashboard', this)"><i class="fas fa-tasks"></i> Flux Demandes</div>
    <div class="nav-item" onclick="switchPage('maintenance', this)"><i class="fas fa-tools"></i> Maintenance</div>
    <div class="nav-item" onclick="switchPage('finances', this)"><i class="fas fa-file-invoice-dollar"></i> Finances</div>
    <div class="nav-item" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> Mode Nuit</div>
</div>

<div class="main-content">
    <header>
        <h1 id="page-title">Flux Demandes</h1>
    </header>

    <div id="dashboard" class="page-content active">
        <div class="grid-container" id="app"></div>
    </div>

    <div id="maintenance" class="page-content">
        <div class="card">
            <h3>Live Maintenance</h3>
            <table>
                <thead><tr><th>Bien</th><th>Problème</th><th>Photo</th><th>Statut</th></tr></thead>
                <tbody>
                    <tr><td>Villa Azure</td><td>Fuite d'eau SDB</td><td><i class="fas fa-image"></i></td><td style="color:var(--danger)">En cours</td></tr>
                    <tr><td>Studio Palais</td><td>Ampoule grillée</td><td>-</td><td style="color:var(--warning)">En attente</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="finances" class="page-content">
        <div class="kpi-card">
            <h3>Rapport Financier - Février 2026</h3>
            <p style="margin: 15px 0; color:var(--muted)">Revenus : 28 500 € | Frais Ménage : 4 200 €</p>
            <button class="btn btn-vtc" onclick="alert('PDF généré et envoyé au propriétaire !')">Générer Rapport PDF</button>
        </div>
    </div>
</div>

<script>
    // 1. Données des demandes (avec Analyseur de Sentiment IA)
    const actions = [
        { id: 1, client: "H. Müller", log: "Villa Azure", sentiment: "normal", msg: "Arrivée 13h ?", phone: "33612345678", suggest: "Ok 13h." },
        { id: 2, client: "Client Fâché", log: "Penthouse", sentiment: "colère", msg: "La clim est en panne, c'est inacceptable !", phone: "33600000000", suggest: "⚠️ Réparation urgence + VTC offert." }
    ];

    function renderDemandes() {
        const container = document.getElementById('app');
        container.innerHTML = actions.map(a => `
            <div class="card" style="border-top-color: ${a.sentiment === 'colère' ? 'var(--danger)' : 'var(--primary)'}">
                ${a.sentiment === 'colère' ? `<div class="alert-badge">⚠️ Client Mécontent</div>` : ''}
                <div class="client-header">
                    <div class="client-info">
                        <div class="client-avatar">${a.client.split(' ').map(n=>n[0]).join('')}</div>
                        <div><strong>${a.client}</strong><br><small style="color:var(--muted)">${a.log}</small></div>
                    </div>
                </div>
                <div class="msg-box">"${a.msg}"</div>
                <div class="suggest-box"><i class="fas fa-robot"></i> ${a.suggest}</div>
                <div class="btn-grid">
                    <button class="btn btn-val" onclick="validate(${a.id})">Valider</button>
                    <button class="btn btn-wa" onclick="sendWA('${a.phone}', '${a.suggest}')">WhatsApp</button>
                    <button class="btn btn-vtc" onclick="alert('VTC commandé pour ${a.client} !')"><i class="fas fa-car"></i></button>
                </div>
            </div>
        `).join('');
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function sendWA(phone, message) { window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank'); }
    function switchPage(pageId, element) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
        document.getElementById('page-title').innerText = element.innerText;
    }

    renderDemandes();
</script>
</body>
</html>
